site_name: Daily Hub — Docs
site_description: Documentação de produto e engenharia do Daily Hub
docs_dir: docs

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Tema escuro
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Tema claro
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.highlight

markdown_extensions:
  - tables
  - toc:
      permalink: true
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

# Fora do site: a pasta-modelo (scaffold) e o snapshot operacional local.
exclude_docs: |
  features/_template/
  reports/CURRENT_STATE.md

nav:
  - Início: index.md
  - Project Brief: PROJECT_BRIEF.md
  - Arquitetura: ARCHITECTURE.md
  - Modelo de dados: data-model.md
  - Decisões: DECISIONS.md
  - Glossário: GLOSSARY.md
  - Roadmap: ROADMAP.md
  - Backlog: BACKLOG.md
  - Convenções: conventions.md
  - Requisitos não-funcionais: nfr/NON_FUNCTIONAL.md
  - Deploy: deploy.md
  - Relatórios: reports/README.md
  - Design System:
      - Visão geral: design-system/index.md
      - Tokens: design-system/tokens.md
      - Componentes: design-system/components.md
      - Direção de UI: design-system/direction.md
      - Redesenho: design-system/redesign.md
