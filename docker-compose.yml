services:
  postgres:
    image: postgres:16-alpine
    container_name: daily-hub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: daily
      POSTGRES_PASSWORD: daily
      POSTGRES_DB: daily_hub
    ports:
      - "5432:5432"
    volumes:
      - daily-hub-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daily -d daily_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: daily-hub-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - daily-hub-minio:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  daily-hub-pgdata:
  daily-hub-minio:
