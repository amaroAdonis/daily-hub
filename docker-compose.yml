services:
  postgres:
    image: postgres:16-alpine
    container_name: daily-hub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: daily
      POSTGRES_PASSWORD: daily
      POSTGRES_DB: daily_hub
    ports:
      - "5432:5432"
    volumes:
      - daily-hub-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daily -d daily_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  daily-hub-pgdata:
